<!DOCTYPE html>
<html>
<head>
    <title>Number Pattern</title>

    <style>
        table{
            border-collapse: collapse;
            margin: 40px auto;
        }

        td{
            width: 40px;
            height: 40px;
            text-align: center;
            font-family: Arial;
            font-size: 14px;
            font-weight: bold;
        }
    </style>

    <script>

        let num = 100;

        document.write("<table border='1'>");

        for (let row = 1; row <= 10; row++)
         {

            document.write("<tr>");

            if (row % 2 == 1) {

                for (let col = 1; col <= 10; col++) {

                    if (col % 2 == 1) {
                        document.write("<td bgcolor='lightblue'>" + num + "</td>");
                    } 
                    else
                     {
                        document.write("<td bgcolor='lightgray'>" + num + "</td>");
                    }

                    num = num - 1;
                }

            } else {

                let temp = num - 9;

                for (let col = 1; col <= 10; col++) {

                    if (col % 2 == 1) {
                        document.write("<td bgcolor='lightgray'>" + temp + "</td>");
                    }
                    
                    else {

                        document.write("<td bgcolor='lightblue'>" + temp + "</td>");
                    }

                    temp = temp + 1;
                }

                num = num - 10;
            }

            document.write("</tr>");
        }

        document.write("</table>");

    </script>

</head>

<body>
</body>
</html>
