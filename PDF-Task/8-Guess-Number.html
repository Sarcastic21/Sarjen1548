<!DOCTYPE html>
<html>
<head>
  <title>Number Guess Game</title>
</head>

<body>

<h2>Guess a Number (1 to 10)</h2>

<input type="number" id="userInput" placeholder="Type number">
<button onclick="verifyGuess()">Submit</button>

<p id="resultText"></p>

<script>

let target = Math.floor(Math.random() * 10) + 1;

function verifyGuess(){

  let inputVal = document.getElementById("userInput").value;

  let message = "";

  if(Number(inputVal) === target){
    message = "Correct! Number was " + target;
  } else {
    message = "Wrong! Try again. Number was " + target;
  }

  document.getElementById("resultText").innerHTML = message;

  target = Math.floor(Math.random() * 10) + 1;
}

</script>

</body>
</html>
